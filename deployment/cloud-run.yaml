# Cloud Run 服務參考設定
#
# 這個 YAML 主要當作部署參考；實際 deploy 用 gcloud run deploy 即可：
#
#   cd backend
#   gcloud run deploy clinic-os-backend \
#     --source . \
#     --region asia-east1 \
#     --platform managed \
#     --allow-unauthenticated \
#     --add-cloudsql-instances PROJECT_ID:REGION:INSTANCE_ID \
#     --set-env-vars "APP_ENV=production,..." \
#     --set-secrets "DATABASE_URL=database-url:latest,FIREBASE_PROJECT_ID=firebase-project-id:latest"
#
# Region 建議用 asia-east1（彰化）或 asia-east2（香港），對澳門延遲低
# Min instances 設 0 可省錢，但第一個請求會冷啟動（醫療系統建議 min=1）

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: clinic-os-backend
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # 與 Cloud SQL 私有連線（也可改用 Cloud SQL Auth Proxy / Private IP）
        run.googleapis.com/cloudsql-instances: PROJECT_ID:REGION:INSTANCE_ID
        # 最少 1 個常駐 instance（避免冷啟動，有需要可降為 0 省錢）
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: gcr.io/PROJECT_ID/clinic-os-backend:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
          env:
            - name: APP_ENV
              value: production
            # 真正的 secret 用 Secret Manager 注入，不要寫在這裡
