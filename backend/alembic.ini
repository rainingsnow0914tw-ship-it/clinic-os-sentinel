# Alembic configuration
#
# 資料庫連線字串會由 alembic/env.py 從 app.core.config.settings 讀取，
# 所以這裡留空。這樣 dev / prod 都用同一份 alembic.ini，環境差異只透過 .env 控制。
#
# 跑法：
#   alembic upgrade head     ← 升級到最新版
#   alembic revision -m "描述" --autogenerate ← 自動生成 migration
#   alembic downgrade -1     ← 倒退一個版本

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]
# 暫時不啟用 black / ruff 自動格式化 migration 檔，留簡潔

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
