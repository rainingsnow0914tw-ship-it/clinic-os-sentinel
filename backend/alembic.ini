# Alembic configuration
#
# DATABASE_URL is read by alembic/env.py from app.core.config.settings,
# so this file leaves sqlalchemy.url blank. dev / prod share one ini,
# environment differences are controlled only through .env.
#
# Commands:
#   alembic upgrade head      -- upgrade to latest
#   alembic revision -m "msg" --autogenerate    -- auto-generate migration
#   alembic downgrade -1      -- step back one version
#
# NOTE: this file is parsed with the system locale codec (cp950 on Windows
# zh-TW), so all comments here are kept ASCII to avoid UnicodeDecodeError.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]
# black / ruff auto-format disabled to keep migrations diff-clean

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
